<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>CRUD_prinsipinin_izahı</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="container mt-5">

    <h1 class="text-teal mb-4">Sözlər (FastAPİ və PostgresSQL) https://fastapi-test-ehp2.onrender.com/docs </h1>

    <!-- CREATE -->
    <form action="/items/create" method="post" class="mb-4 d-flex gap-2 flex-wrap">
        <input type="text" name="name" placeholder="Yeni söz" class="form-control" required>
        <input type="text" name="description" placeholder="Təsvir" class="form-control">
        <button type="submit" class="btn btn-success">Əlavə et</button>
    </form>

    <!-- ITEM LIST -->
    <ul class="list-group">
        {% for item in items %}
        <li class="list-group-item d-flex justify-content-between align-items-center flex-wrap">
            <div>
                <strong>{{ item.name }}</strong> - {{ item.description or "" }}
            </div>
            <div class="d-flex gap-2 mt-2 mt-md-0">
                <!-- UPDATE -->
                <form action="/items/update/{{ item.id }}" method="post" class="d-flex gap-2 flex-wrap">
                    <input type="text" name="name" placeholder="Yeni ad" class="form-control" required>
                    <input type="text" name="description" placeholder="Yeni təsvir" class="form-control">
                    <button type="submit" class="btn btn-primary btn-sm">Redaktə et</button>
                </form>

                <!-- DELETE -->
                <form action="/items/delete/{{ item.id }}" method="post">
                    <button type="submit" class="btn btn-danger btn-sm">Sil</button>
                </form>
            </div>
        </li>
        {% else %}
        <li class="list-group-item">Hələ heç bir item yoxdur.</li>
        {% endfor %}
    </ul>

    <!-- Bootstrap JS (optional) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
